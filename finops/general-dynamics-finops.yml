specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: General Dynamics
providerId: general-dynamics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Defense
  - Aerospace
description: General Dynamics revenue is contract-based across defense, aerospace, marine, and
  technology services. There is no SaaS or API billing surface; FinOps for downstream consumers
  applies to program / contract management rather than per-call usage.
notes: No public API or pricing surface; FinOps shape inferred from a defense-contractor program
  model.
sources:
  - https://www.gd.com/
  - https://www.gdit.com/
