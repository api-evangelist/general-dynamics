meters:
  - name: contract_milestones
    unit: milestone
    aggregation: count
    dimensions:
      - program
      - contract_id
  - name: program_hours
    unit: hour
    aggregation: sum
    dimensions:
      - program
      - labor_category
  - name: deliverables
    unit: unit
    aggregation: sum
    dimensions:
      - program
      - cdrl
principles:
  - name: Visibility
    description: Reconcile General Dynamics invoices against contract line items (CLINs) and
      milestone schedules; track earned-value per program.
  - name: Allocation
    description: Allocate program cost to mission / capability owners; tag CLINs to
      appropriations.
  - name: Optimization
    description: Use IDIQ / multi-award vehicles to drive task-order competition; right-size
      labor categories; review fixed-price vs cost-plus mix.
  - name: Accountability
    description: Program manager owns spend and EVM variance; contracting officer governs
      change orders.
